  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-image: linear-gradient(rgba(228,225,210,0.65), rgba(228,225,210,0.65)), var(--tex-grain);
    background-size: cover;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 440px;
    width: 100%;
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 20px 48px rgba(20,26,18,0.22), 0 4px 12px rgba(20,26,18,0.1);
  }

  .card-header {
    background-image: linear-gradient(160deg, rgba(20,26,18,0.35) 0%, rgba(15,20,14,0.68) 100%), var(--tex-hero);
    background-size: cover;
    background-position: center;
    padding: 34px 32px 28px;
  }
  .brand-sub { font-size: 10px; letter-spacing: 3px; color: #9CB380; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  .brand-title { font-family: 'Noto Sans KR', sans-serif; font-size: 19px; font-weight: 300; color: #F4F1E8; letter-spacing: 0.5px; }
  .brand-title span { color: #9CB380; font-weight: 600; }

  .card-body {
    background-image: linear-gradient(rgba(244,241,232,0.92), rgba(244,241,232,0.92)), var(--tex-grain);
    background-size: cover;
    padding: 34px 32px;
  }
  .q-title { font-size: 19px; font-weight: 600; color: #20392C; line-height: 1.6; margin-bottom: 12px; }
  .q-desc { font-size: 13px; font-weight: 400; color: #55605A; line-height: 1.85; margin-bottom: 28px; }
  .q-desc strong { color: #20392C; font-weight: 600; }

  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1px; color: #4A5D3A; text-transform: uppercase; margin-bottom: 8px; }
  .field { margin-bottom: 20px; }
  input[type="text"], textarea {
    width: 100%;
    background-image: linear-gradient(rgba(255,255,255,0.93), rgba(255,255,255,0.93)), var(--tex-light);
    background-size: cover;
    border: 1px solid rgba(74,93,58,0.22);
    border-radius: 14px;
    padding: 13px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: #20392C;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus { outline: none; border-color: #4A5D3A; }
  textarea { min-height: 110px; }
  .optional-tag { color: #A9A290; font-weight: 400; text-transform: none; letter-spacing: 0; }

  .submit-btn {
    width: 100%;
    background-image: linear-gradient(160deg, rgba(32,57,44,0.92) 0%, rgba(15,20,14,0.95) 100%), var(--tex-dark);
    background-size: cover;
    color: #F4F1E8;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 8px 18px rgba(20,26,18,0.32), inset 0 1px 0 rgba(255,255,255,0.14);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .submit-btn:active { transform: translateY(2px); box-shadow: 0 3px 8px rgba(20,26,18,0.3), inset 0 1px 0 rgba(255,255,255,0.1); }
  .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .success-screen { display: none; padding: 52px 32px; text-align: center; }
  .success-icon { font-size: 40px; margin-bottom: 18px; }
  .success-title { font-size: 20px; font-weight: 600; color: #20392C; margin-bottom: 14px; line-height: 1.6; }
  .success-desc { font-size: 13px; font-weight: 400; color: #55605A; line-height: 1.85; }

  .footer-note {
    background-image: linear-gradient(rgba(244,241,232,0.92), rgba(244,241,232,0.92)), var(--tex-grain);
    background-size: cover;
    padding: 18px 32px 26px;
    text-align: center;
    font-size: 11px;
    font-weight: 400;
    color: #A9A290;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="brand-sub">Gran Seoul Fitness</div>
    <div class="brand-title">Body <span>Letter</span></div>
  </div>

  <div id="formScreen" class="card-body">
    <div class="q-title">궁금했던 내용이 있으신가요?</div>
    <div class="q-desc">
      운동을 하시면서, 혹은 내 몸에 대해 평소 궁금했던 점을
      편하게 남겨주세요. <strong>다음 호 주제</strong>에 참고하겠습니다.
    </div>

    <form id="questionForm">
      <div class="field">
        <label>이름 <span class="optional-tag">(선택)</span></label>
        <input type="text" id="nameInput" placeholder="입력하지 않아도 됩니다">
      </div>
      <div class="field">
        <label>궁금한 내용</label>
        <textarea id="contentInput" placeholder="예: 앉아있을 때 다리를 꼬면 정말 안 좋은가요?" required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">보내기</button>
    </form>
  </div>

  <div id="successScreen" class="success-screen">
    <div class="success-icon">🌿</div>
    <div class="success-title">소중한 의견 감사합니다</div>
    <div class="success-desc">
      남겨주신 내용은 다음 Body Letter 주제 선정에<br>
      참고하겠습니다. 감사합니다.
    </div>
  </div>

  <div class="footer-note">Gran Seoul Fitness × Body Letter</div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywp0lF9kWDiSI0GcfiqFS5EOQ0R8nXZ76mVnvSKnTPcQTEWtQDO0lAEdbKbbAyNFl7bQ/exec";

  document.getElementById('questionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('nameInput').value.trim();
    const content = document.getElementById('contentInput').value.trim();
    if (!content) return;

    // 화면은 클릭 즉시 감사 화면으로 전환
    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';

    // 실제 전송은 뒤에서 조용히 진행 (사용자는 기다릴 필요 없음)
    const payload = new URLSearchParams({
      action: 'question',
      name: name || '익명',
      content: content,
      timestamp: new Date().toISOString()
    });

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: payload.toString()
    }).catch(function() {
      // 실패해도 사용자 화면에는 영향 없음 (이미 감사 화면을 보여준 뒤라 재전송 유도는 하지 않음)
    });
  });
</script>

</body>
</html>
